name: CI (ReactJs test)
run-name: "CI | ${{ github.event_name }} | ${{ github.ref_name }}"

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci